<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid black;
        }
        .controls {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Game</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">
        <button id="buildSphereBtn">Build Sphere</button>
        <button id="expandTerritoryBtn">Expand Territory</button>
        <button id="resetGameBtn">Reset Game</button>
    </div>
    <div id="resources">
        <h2>Resources</h2>
        <p id="resourceDisplay">Spheres: 0</p>
    </div>
    <script>
        // Game script here
        let spheres = 0;
        const resourceDisplay = document.getElementById('resourceDisplay');

        document.getElementById('buildSphereBtn').onclick = function() {
            spheres++;
            resourceDisplay.innerText = `Spheres: ${spheres}`;
        };

        document.getElementById('expandTerritoryBtn').onclick = function() {
            // Logic to expand territory
            alert('Territory expanded!');
        };

        document.getElementById('resetGameBtn').onclick = function() {
            spheres = 0;
            resourceDisplay.innerText = `Spheres: ${spheres}`;
            // Logic to reset game
            alert('Game reset!');
        };
    </script>
</body>
</html>
